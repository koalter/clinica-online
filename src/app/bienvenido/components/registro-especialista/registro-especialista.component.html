<div class="container col-sm-8 col-md-6 col-lg-4 col-xxl-3 border-primary p-4">
    <h3>Registro de especialista nuevo</h3>
    <form class="border-bottom mb-3" [formGroup]="formulario">
        <div class="form-floating input my-3">
            <input class="form-control" type="text" id="nombre" formControlName="nombre" placeholder="Nombre">
            <label class="text-muted" for="nombre">Nombre</label>
        </div>
        <div class="form-floating input my-3">
            <input class="form-control" type="text" id="apellido" formControlName="apellido" placeholder="Apellido">
            <label class="text-muted" for="apellido">Apellido</label>
        </div>
        <div class="form-floating input my-3">
            <input class="form-control" type="text" id="edad" formControlName="edad" placeholder="Edad">
            <label class="text-muted" for="edad">Edad</label>
        </div>
        <div class="form-floating input my-3">
            <input class="form-control" type="text" id="dni" formControlName="dni" placeholder="DNI (sólo números)">
            <label class="text-muted" for="dni">DNI (sólo números)</label>
        </div>
        <div class="form-floating input my-3">
            <input class="form-control" type="text" id="especialidad" formControlName="especialidad" placeholder="Especialidad">
            <label class="text-muted" for="especialidad">Especialidad</label>
        </div>
        <div class="form-floating input my-3">
            <input class="form-control" type="email" id="correo" formControlName="correo" placeholder="Correo electrónico">
            <label class="text-muted" for="correo">Correo electrónico</label>
        </div>
        <div class="form-floating input my-3">
            <input class="form-control" type="password" id="clave" formControlName="clave" placeholder="Contraseña">
            <label class="text-muted" for="clave">Contraseña</label>
        </div>
        <div class="form-floating input my-3">
            <input class="form-control" type="password" id="claveVerificacion" formControlName="claveVerificacion" placeholder="Repetí tu contraseña">
            <label class="text-muted" for="claveVerificacion">Repetí tu contraseña</label>
        </div>
        <button routerLink="" class="btn btn-success w-100 p-3 mb-4" (click)="enviarCredenciales()">Registrarse</button>
    </form>
    <p class="text-center">¿Ya tenés un usuario? <a routerLink="../../login">Iniciá sesión</a></p>
    <p class="text-center">¿Necesitás atenderte? <a routerLink="../paciente">Llená este formulario</a></p>
</div>
