<div class="container col-sm-8 col-md-6 col-lg-4 col-xxl-3 border-primary p-4">
    <h3>Registro de paciente nuevo</h3>
    <form class="border-bottom mb-3" [formGroup]="formulario" (ngSubmit)="enviarCredenciales()">
        <div class="form-floating input my-3">
            <input class="form-control" type="text" id="nombre" formControlName="nombre" placeholder="Nombre" required>
            <label class="text-muted" for="nombre">Nombre</label>
        </div>
        <div class="form-floating input my-3">
            <input class="form-control" type="text" id="apellido" formControlName="apellido" placeholder="Apellido" required>
            <label class="text-muted" for="apellido">Apellido</label>
        </div>
        <div class="form-floating input my-3">
            <input class="form-control" type="text" id="edad" formControlName="edad" placeholder="Edad" required>
            <label class="text-muted" for="edad">Edad</label>
        </div>
        <div class="form-floating input my-3">
            <input class="form-control" type="text" id="dni" formControlName="dni" placeholder="DNI (sólo números)" required minlength="7" maxlength="8">
            <label class="text-muted" for="dni">DNI (sólo números)</label>
        </div>
        <div class="form-floating input my-3">
            <input class="form-control" type="text" id="obra_social" formControlName="obra_social" placeholder="Obra Social" required>
            <label class="text-muted" for="obra_social">Obra Social</label>
        </div>
        <div class="form-floating input my-3">
            <input class="form-control" type="email" id="correo" formControlName="correo" placeholder="Correo electrónico" required>
            <label class="text-muted" for="correo">Correo electrónico</label>
        </div>
        <div class="form-floating input my-3">
            <input class="form-control" type="password" id="clave" formControlName="clave" placeholder="Contraseña" required [pattern]="this.formulario.get('clave_verificacion')?.value">
            <label class="text-muted" for="clave">Contraseña</label>
        </div>
        <div class="form-floating input my-3">
            <input class="form-control" type="password" id="clave_verificacion" formControlName="clave_verificacion" placeholder="Repetí tu contraseña" required [pattern]="this.formulario.get('clave')?.value">
            <label class="text-muted" for="clave_verificacion">Repetí tu contraseña</label>
        </div>
        <div class="row my-3">
            <div class="input col-8">
                <label class="form-label" for="imagen_a">Imágen de perfil 1</label>
                <input type="file" class="form-control" id="imagen_a" (change)="imagenA_change($event)" />
            </div>
            <div class="col-3">
                <img *ngIf="rutaImagenA" [src]="rutaImagenA" alt="Foto de perfil" style="height: 100px;">
            </div>
        </div>
        <div class="row my-3">
            <div class="input col-8">
                <label class="form-label" for="imagen_b">Imágen de perfil 2</label>
                <input type="file" class="form-control" id="imagen_b" (change)="imagenB_change($event)" />
            </div>
            <div class="col-3">
                <img *ngIf="rutaImagenB" [src]="rutaImagenB" alt="Foto de perfil" style="height: 100px;">
            </div>
        </div>
        <button type="submit" routerLink="" class="btn btn-success w-100 p-3 mb-4">Registrarse</button>
    </form>
    <p class="text-center">¿Ya tenés un usuario? <a routerLink="../../login">Iniciá sesión</a></p>
    <p class="text-center">¿Sos un especialista? <a routerLink="../especialista">Llená este formulario</a></p>
</div>

<app-spinner [condicion]="this.spinner"></app-spinner>
